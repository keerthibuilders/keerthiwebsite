server {
    listen 80;
    listen [::]:80;
    server_name keerthibuilders.com www.keerthibuilders.com;

    # Redirect HTTP → HTTPS
    return 301 https://www.keerthibuilders.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name keerthibuilders.com www.keerthibuilders.com;

    # SSL (replace with your cert paths from Certbot / Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/keerthibuilders.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/keerthibuilders.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Redirect non-www → www
    if ($host = keerthibuilders.com) {
        return 301 https://www.keerthibuilders.com$request_uri;
    }

    # Document root (where Vite build output goes)
    root /var/www/keerthibuilders/dist;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 256;

    # Cache static assets
    location ~* \.(js|css|woff2|woff|ttf|ico|webp|png|jpg|jpeg|svg|mp4)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Sitemap & robots — short cache
    location ~* \.(xml|txt)$ {
        expires 1d;
        add_header Cache-Control "public";
    }

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # SPA routing — all routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Custom error pages
    error_page 404 /index.html;
    error_page 500 502 503 504 /index.html;
}
